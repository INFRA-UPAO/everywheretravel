<div class="login-container">
  <!-- Left Panel - Branding -->
  <div class="login-branding">
    <div class="branding-content">
      <img src="/Frame.svg" alt="Everywhere Travel Logo" style="width: 100%; height: auto; max-width: 100%; object-fit: contain; margin-bottom: 2rem;">

      <div class="version-info">
        <span>Version 1.0</span>
      </div>
    </div>

    <!-- Decorative Elements -->
    <div class="decorative-elements">
      <div class="floating-shape shape-1"></div>
      <div class="floating-shape shape-2"></div>
      <div class="floating-shape shape-3"></div>
    </div>
  </div>

  <!-- Right Panel - Login -->
  <div class="login-form-panel">
    <div class="form-container">
      <div class="form-header">
        <h2>Iniciar Sesion</h2>
        <p>Accede a tu cuenta para continuar</p>
      </div>

      <!-- Cognito Login Button -->
      <div class="login-form">
        <button
          type="button"
          class="submit-button"
          [disabled]="isLoading"
          [class.loading]="isLoading"
          (click)="onLogin()"
        >
          <span *ngIf="!isLoading" class="button-content">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="10,17 15,12 10,7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="15" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Iniciar Sesion</span>
          </span>
          <span *ngIf="isLoading" class="loading-content">
            <div class="spinner"></div>
            <span>Redirigiendo...</span>
          </span>
        </button>
      </div>

      <!-- Footer Links -->
      <div class="form-footer">
        <p class="copyright">2025 Everywhere Travel. Todos los derechos reservados.</p>
      </div>
    </div>
  </div>
</div>
