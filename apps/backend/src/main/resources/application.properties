spring.application.name=everywhere-backend

#Configuracion de la ruta base para la API v1
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:everywheretravel}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Zona horaria por defecto para la app (sobrescribible con APP_TIMEZONE)
app.timezone=${APP_TIMEZONE:America/Lima}

# Configuracion optimizada de HikariCP para produccion
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.connection-init-sql=SET TIME ZONE '${app.timezone}'

#Configuracion de JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=${app.timezone}

#Configuracion de Jackson para JSON
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.time-zone=${app.timezone}

# Spring Security OAuth2 Resource Server (Cognito)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

server.address=0.0.0.0
server.port=8080
