name: SonarQube Local Analysis

on:
  push:
    branches: [dev, main]
    paths:
      - "iac/**"
  pull_request:
    branches: [dev, main]
    paths:
      - "iac/**"
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan + Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        run: |
          docker run --rm \
            -e SONAR_HOST_URL="${{ secrets.SONAR_HOST_URL }}" \
            -e SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}" \
            -v "${{ github.workspace }}/iac:/usr/src" \
            sonarsource/sonar-scanner-cli

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v4
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: iac/.scannerwork/report-task.txt
